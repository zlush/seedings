<script type="text/babel">
const __TWEAKS_STYLE = `

  select.twk-field{padding-right:22px;

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}

    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(resolve(e.target.value))}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && (<span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>)}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakToggle, TweakRadio, TweakColor,
});
</script>

<script type="text/babel">
function Nav({onCTA}) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const items = [
    ["Servicios", "#servicios"],
    ["Proceso", "#proceso"],
    ["FAQ", "#faq"],
    ["Contacto", "#contacto"],
  ];
  return (
    <header style={{
      position:"fixed", top:0, left:0, right:0, zIndex:50,
      transition:"all .35s ease",
      background: scrolled ? "rgba(42,18,20,0.78)" : "transparent",
      backdropFilter: scrolled ? "blur(18px) saturate(140%)" : "none",
      WebkitBackdropFilter: scrolled ? "blur(18px) saturate(140%)" : "none",
      borderBottom: scrolled ? "1px solid var(--line)" : "1px solid transparent",
    }}>
      <div className="container" style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        height: scrolled ? 76 : 96, transition:"height .35s ease",
      }}>
        <nav style={{display:"flex", gap:32, alignItems:"center"}} className="navlinks">
          {items.map(([label, href]) => (
            <a key={href} href={href} style={{
              fontSize:13, fontWeight:500, letterSpacing:".02em",
              opacity:.78, transition:"opacity .2s",
            }} onMouseEnter={e=>e.currentTarget.style.opacity=1}
               onMouseLeave={e=>e.currentTarget.style.opacity=.78}>{label}</a>
          ))}
        </nav>
        <a href="#" style={{display:"flex", alignItems:"center"}}>
          <img src="assets/seedings-logo.png" alt="Seedings Lab"
               style={{
                 height: scrolled ? 48 : 64, width:"auto", display:"block",
                 transition:"height .35s ease",
               }}/>
        </a>
      </div>
      <style>{`@media(max-width:820px){.navlinks{display:none !important}}`}</style>
    </header>
  );
}
Object.assign(window, { Nav });
</script>

<script type="text/babel">
function Hero() {
  return (
    <section style={{
      position:"relative", minHeight:"100vh", paddingTop:0, paddingBottom:80,
      overflow:"hidden", display:"flex", flexDirection:"column",
    }}>
      <div style={{
        position:"absolute", inset:0, pointerEvents:"none",
        background:"radial-gradient(ellipse 60% 50% at 78% 28%, rgba(195,157,91,.10), transparent 70%), radial-gradient(ellipse 70% 60% at 20% 80%, rgba(160,74,59,.14), transparent 70%)",
      }}/>

function FormField({label, value, onChange, placeholder, type="text", required}) {
  return (
    <div>

        {label}{required && <span style={{color:"var(--terra)", marginLeft:6}}>*</span>}
      </label>
      <input type={type} value={value} required={required} placeholder={placeholder}
        onChange={(e)=>onChange(e.target.value)}
        style={{
          width:"100%", background:"transparent", border:"none",
          borderBottom:"1px solid var(--line-strong)", color:"var(--cream)",
          fontSize:18, fontFamily:"'Bodoni Moda',serif", fontWeight:500,
          padding:"10px 0 12px", outline:"none",
        }}
        onFocus={e=>e.target.style.borderBottomColor="var(--cream)"}
        onBlur={e=>e.target.style.borderBottomColor="var(--line-strong)"}
      />
    </div>
  );
}

function FormTextarea({label, value, onChange, placeholder}) {
  return (
    <div>
      <label className="mono" style={{display:"block", fontSize:11, opacity:.55, letterSpacing:".12em", textTransform:"uppercase", marginBottom:8}}>{label}</label>
      <textarea value={value} placeholder={placeholder} rows={3} onChange={(e)=>onChange(e.target.value)}
        style={{
          width:"100%", background:"transparent", resize:"vertical", border:"none",
          borderBottom:"1px solid var(--line-strong)", color:"var(--cream)",
          fontSize:15, fontFamily:"'Inter',sans-serif", fontWeight:400,
          padding:"10px 0 12px", outline:"none", lineHeight:1.5,
        }}
        onFocus={e=>e.target.style.borderBottomColor="var(--cream)"}
        onBlur={e=>e.target.style.borderBottomColor="var(--line-strong)"}
      />
    </div>
  );
}
Object.assign(window, { CTA, FormField, FormTextarea });
</script>

<script type="text/babel">
function App() {
  const TWEAK_DEFAULTS = {
    "palette": "wine",
    "accent": "#A04A3B",
    "showMarquee": true
  };

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(()=>{
    const palettes = {
      wine: { wine:"#3D1B1E", wineDeep:"#2A1214", wineSoft:"#4A2226", cream:"#EBE4CC", creamPaper:"#F2ECD7" },
      warm: { wine:"#4A2620", wineDeep:"#321712", wineSoft:"#5A302A", cream:"#EFE6CB", creamPaper:"#F5EDD4" },
      midnight: { wine:"#1F1F2A", wineDeep:"#13131C", wineSoft:"#2A2A38", cream:"#EBE4CC", creamPaper:"#F2ECD7" },
      forest: { wine:"#1F2A22", wineDeep:"#131C16", wineSoft:"#2A382E", cream:"#EBE4CC", creamPaper:"#F2ECD7" },
    };
    const p = palettes[tweaks.palette] || palettes.wine;
    const root = document.documentElement;
    root.style.setProperty("--wine", p.wine);
    root.style.setProperty("--wine-deep", p.wineDeep);
    root.style.setProperty("--wine-soft", p.wineSoft);
    root.style.setProperty("--cream", p.cream);
    root.style.setProperty("--cream-paper", p.creamPaper);
    root.style.setProperty("--terra", tweaks.accent || "#A04A3B");
  }, [tweaks.palette, tweaks.accent]);

  function scrollToContact() {
    document.getElementById("contacto")?.scrollIntoView({behavior:"smooth", block:"start"});
  }

  return (
    <>
      <Nav onCTA={scrollToContact} />
      <Hero />
      {tweaks.showMarquee && <Marquee />}
      <Manifesto />
      <Servicios />
      <Proceso />
      <CTA />
      <Footer />

      <TweaksPanel>
        <TweakSection label="Paleta" />
        <TweakRadio
          label="Tema"
          value={tweaks.palette}
          options={["wine","warm","midnight","forest"]}
          onChange={v=>setTweak("palette", v)} />
        <TweakColor
          label="Acento"
          value={tweaks.accent}
          options={["#A04A3B","#C39D5B","#C97E6F","#8A6B3E"]}
          onChange={v=>setTweak("accent", v)} />
        <TweakSection label="Layout" />
        <TweakToggle label="Mostrar marquee" value={tweaks.showMarquee} onChange={v=>setTweak("showMarquee", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
